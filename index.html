<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zayran Collective</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0B0B0B;
    color:#fff;
}

header{
    display:flex;
    justify-content:space-between;
    padding:20px;
    background:#111;
    align-items:center;
}

.logo{
    color:#D4AF37;
    font-size:24px;
    font-weight:bold;
}

.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:42px;
    margin-bottom:10px;
}

.hero p{
    color:#B3B3B3;
    margin-bottom:20px;
}

.btn{
    background:#D4AF37;
    color:#000;
    padding:12px 25px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}

.section{
    padding:40px 20px;
    max-width: 600px;
    margin: 0 auto;
}

.card{
    background:#171717;
    padding:20px;
    margin-bottom:15px;
    border-radius:10px;
}

.price{
    color:#D4AF37;
    font-weight:bold;
}

/* --- PAYMENT SECTION STYLE --- */
.payment-section {
    text-align: center;
    padding: 30px 20px;
    background: #111;
    border-radius: 15px;
    margin: 30px 20px;
}

.payment-section img {
    border-radius: 10px;
    margin: 15px 0;
    border: 3px solid #fff;
}

.upi-id {
    font-family: monospace;
    background: #222;
    padding: 8px 15px;
    border-radius: 5px;
    display: inline-block;
    color: #D4AF37;
    word-break: break-all;
}

footer{
    text-align:center;
    padding:20px;
    background:#111;
    margin-top:40px;
}

.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:#fff;
    padding:12px 18px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
    z-index: 1000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<header>
<div class="logo">Zayran Collective</div>
</header>

<section class="hero">
<h1>Zayran Collective</h1>
<p>Premium thrift & branded fashion store</p>
<a class="btn" href="https://wa.me/919105704376">Shop Now</a>
</section>

<section class="section">
<h2 style="text-align:center;color:#D4AF37;">Featured Items</h2>

<div class="card">
<h3>Zara Shirt</h3>
<p>Condition: 9/10</p>
<p class="price">₹799</p>
</div>

<div class="card">
<h3>Lacoste Polo</h3>
<p>Condition: 8.5/10</p>
<p class="price">₹1299</p>
</div>
</section>

<!-- Ab Payment Section ekdum sahi jagah par hai -->
<section class="payment-section">
<h2 style="color:#D4AF37; margin-top: 0;">Pay via UPI</h2>
<img src="GooglePay_QR.png" alt="UPI QR Code" width="220">
<p>Scan to pay with any UPI app</p>
<p class="upi-id">zk9118911@okaxis</p>
</section>

<footer>
© 2026 Zayran Collective
</footer>

<!-- Floating WhatsApp Button -->
<a class="whatsapp" href="https://wa.me/919105704376" target="_blank">
WhatsApp
</a>

</body>
</html>
